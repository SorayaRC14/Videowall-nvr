<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Videowall NVR PRO+</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
margin:0;
background:#111;
color:white;
overflow:hidden;
font-family:Arial;
}

#sidebar{
width:260px;
background:#1c1c1c;
height:100vh;
overflow-y:auto;
padding:15px;
border-right:2px solid #333;
}

.camera{
background:#2a2a2a;
padding:10px;
margin-bottom:8px;
border-radius:6px;
cursor:grab;
}

.camera:hover{
background:#3a3a3a;
}

#videowall{
display:grid;
gap:6px;
padding:6px;
height:100vh;
flex:1;
}

.slot{
background:black;
border:2px dashed #444;
position:relative;
border-radius:6px;
overflow:hidden;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
bottom:0;
width:100%;
display:flex;
justify-content:space-between;
background:rgba(0,0,0,0.6);
padding:4px;
font-size:12px;
}

.status{
position:absolute;
top:5px;
right:5px;
font-size:11px;
padding:3px 6px;
border-radius:4px;
}

.online{background:green}
.offline{background:red}

button{
background:none;
border:none;
color:white;
cursor:pointer;
margin-left:5px;
}

.topbar{
position:absolute;
top:10px;
left:270px;
z-index:1000;
}

.fullscreen{
position:fixed !important;
top:0;
left:0;
width:100vw !important;
height:100vh !important;
z-index:9999;
}

</style>

</head>

<body>

<div class="d-flex">

<div id="sidebar">

<h5>Cámaras</h5>
<div id="cameraList"></div>

</div>

<div class="flex-grow-1 position-relative">

<div class="topbar">

<select id="layoutSelect" class="form-select form-select-sm">

<option value="1">1x1</option>
<option value="4">2x2</option>
<option value="6">3x2</option>
<option value="9">3x3</option>
<option value="16">4x4</option>
<option value="25">5x5</option>
<option value="36">6x6</option>

</select>

</div>

<div id="videowall"></div>

</div>

</div>

<script>

let cameras=[]
let streams={}
let layoutMemory={}

async function loadCameras(){

const res=await fetch("http://localhost:3000/api/cameras/webrtc")
cameras=await res.json()

renderCameraList()

}

function renderCameraList(){

const list=document.getElementById("cameraList")
list.innerHTML=""

cameras.forEach(cam=>{

const div=document.createElement("div")

div.className="camera"
div.textContent=cam.name
div.draggable=true

div.addEventListener("dragstart",e=>{
e.dataTransfer.setData("camera",JSON.stringify(cam))
})

list.appendChild(div)

})

}

function setLayout(count){

const wall=document.getElementById("videowall")

wall.innerHTML=""

const cols=Math.ceil(Math.sqrt(count))

wall.style.gridTemplateColumns=`repeat(${cols},1fr)`

for(let i=0;i<count;i++){

const slot=document.createElement("div")

slot.className="slot"
slot.dataset.index=i

slot.addEventListener("dragover",e=>e.preventDefault())

slot.addEventListener("drop",e=>{

e.preventDefault()

const cam=JSON.parse(e.dataTransfer.getData("camera"))

attachCamera(slot,cam)

})

slot.addEventListener("dblclick",()=>{

slot.classList.toggle("fullscreen")

})

wall.appendChild(slot)

}

restoreLayout()

}

async function attachCamera(slot,cam){

slot.innerHTML=""

const video=document.createElement("video")

video.autoplay=true
video.playsInline=true
video.muted=true

slot.appendChild(video)

const status=document.createElement("div")

status.className="status offline"
status.innerText="Connecting"

slot.appendChild(status)

if(!streams[cam.path]){

await createStream(cam)

}

video.srcObject=streams[cam.path].media

status.className="status online"
status.innerText="Online"

createOverlay(slot,cam)

layoutMemory[slot.dataset.index]=cam.path

saveLayout()

}

async function createStream(cam){

const pc=new RTCPeerConnection()

pc.addTransceiver("video",{direction:"recvonly"})

const media=new MediaStream()

pc.ontrack=e=>{
media.addTrack(e.track)
}

const offer=await pc.createOffer()

await pc.setLocalDescription(offer)

await waitIce(pc)

let url=cam.webrtcUrl

if(!url.endsWith("/whep")){
url+="/whep"
}

const res=await fetch(url,{
method:"POST",
headers:{"Content-Type":"application/sdp"},
body:pc.localDescription.sdp
})

const answer=await res.text()

await pc.setRemoteDescription({
type:"answer",
sdp:answer
})

streams[cam.path]={pc,media,cam}

pc.onconnectionstatechange=()=>{

if(pc.connectionState==="failed" || pc.connectionState==="disconnected"){

reconnect(cam)

}

}

}

function waitIce(pc){

return new Promise(resolve=>{

if(pc.iceGatheringState==="complete") return resolve()

pc.onicegatheringstatechange=()=>{

if(pc.iceGatheringState==="complete") resolve()

}

})

}

function reconnect(cam){

setTimeout(()=>{

if(streams[cam.path]){

streams[cam.path].pc.close()

delete streams[cam.path]

}

},3000)

}

function createOverlay(slot,cam){

const overlay=document.createElement("div")

overlay.className="overlay"

const title=document.createElement("span")

title.innerText=cam.name

const controls=document.createElement("span")

const snap=document.createElement("button")

snap.innerText="📸"

snap.onclick=()=>snapshot(slot.querySelector("video"))

controls.appendChild(snap)

overlay.appendChild(title)

overlay.appendChild(controls)

slot.appendChild(overlay)

}

function snapshot(video){

const canvas=document.createElement("canvas")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

canvas.getContext("2d").drawImage(video,0,0)

const link=document.createElement("a")

link.href=canvas.toDataURL()
link.download="snapshot.png"

link.click()

}

function saveLayout(){

localStorage.setItem("videowallLayout",JSON.stringify(layoutMemory))

}

function restoreLayout(){

const saved=localStorage.getItem("videowallLayout")

if(!saved) return

layoutMemory=JSON.parse(saved)

Object.entries(layoutMemory).forEach(([slotIndex,path])=>{

const slot=document.querySelector(`[data-index='${slotIndex}']`)

const cam=cameras.find(c=>c.path===path)

if(slot && cam){

attachCamera(slot,cam)

}

})

}

document.getElementById("layoutSelect").addEventListener("change",e=>{

const value=parseInt(e.target.value)

setLayout(value)

localStorage.setItem("layoutType",value)

})

window.onload=async()=>{

await loadCameras()

const savedLayout=localStorage.getItem("layoutType") || 6

document.getElementById("layoutSelect").value=savedLayout

setLayout(savedLayout)

}

</script>

</body>
</html>

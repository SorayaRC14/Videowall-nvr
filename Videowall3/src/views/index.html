<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Videowall PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #sidebar {
            width: 250px;
            background: #1c1c1c;
            height: 100vh;
            overflow-y: auto;
            padding: 15px;
            border-right: 2px solid #333;
        }

        .camera-item {
            background: #2a2a2a;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 6px;
            cursor: grab;
        }

        .camera-item:hover {
            background: #3a3a3a;
        }

        #videowall {
            display: grid;
            gap: 8px;
            padding: 8px;
            height: 100vh;
            flex: 1;
        }

        .slot {
            background: black;
            border: 2px dashed #444;
            position: relative;
            border-radius: 6px;
            overflow: hidden;
        }

        .slot video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay {
            position: absolute;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.6);
            padding: 4px;
            font-size: 12px;
        }

        .controls button {
            background: transparent;
            border: none;
            color: white;
            margin-left: 5px;
            cursor: pointer;
        }

        .status {
            position: absolute;
            top: 5px;
            right: 5px;
            padding: 3px 6px;
            font-size: 11px;
            border-radius: 4px;
        }

        .online {
            background: green;
        }

        .offline {
            background: red;
        }

        .topbar {
            position: absolute;
            top: 10px;
            left: 270px;
            z-index: 1000;
        }

        .fullscreen {
            position: fixed !important;
            top: 0;
            left: 0;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 9999;
        }
    </style>
</head>

<body>

    <div class="d-flex">

        <div id="sidebar">
            <h5>Cámaras</h5>
            <div id="cameraList"></div>
        </div>

        <div class="flex-grow-1 position-relative">

            <div class="topbar">
                <select id="layoutSelect" class="form-select form-select-sm">
                    <option value="1x1">1x1</option>
                    <option value="2x2">2x2</option>
                    <option value="3x2" selected>3x2</option>
                </select>
            </div>

            <div id="videowall"></div>
        </div>

    </div>

    <script>
        let cameras = [];
        let connections = {};
        let activeAudio = null;

        // ---------------- LOAD CAMERAS ----------------
        async function loadCameras() {
            const res = await fetch("http://localhost:3000/api/cameras/webrtc");
            cameras = await res.json();
            renderCameraList();
        }

        function renderCameraList() {
            const list = document.getElementById("cameraList");
            list.innerHTML = "";

            cameras.forEach(cam => {
                const div = document.createElement("div");
                div.className = "camera-item";
                div.textContent = cam.name;
                div.draggable = true;

                div.addEventListener("dragstart", e => {
                    e.dataTransfer.setData("camera", JSON.stringify(cam));
                });

                list.appendChild(div);
            });
        }

        // ---------------- GRID LAYOUT ----------------
        function setLayout(type) {
            const wall = document.getElementById("videowall");
            wall.innerHTML = "";

            if (type === "1x1") wall.style.gridTemplateColumns = "1fr";
            if (type === "2x2") wall.style.gridTemplateColumns = "repeat(2,1fr)";
            if (type === "3x2") wall.style.gridTemplateColumns = "repeat(3,1fr)";

            const count = type === "1x1" ? 1 : type === "2x2" ? 4 : 6;

            for (let i = 0; i < count; i++) {
                const slot = document.createElement("div");
                slot.className = "slot";
                slot.dataset.index = i;

                slot.addEventListener("dragover", e => e.preventDefault());

                slot.addEventListener("drop", e => {
                    e.preventDefault();
                    const cam = JSON.parse(e.dataTransfer.getData("camera"));
                    loadStream(slot, cam);
                });

                wall.appendChild(slot);
            }

            loadLayout();
        }

        document.getElementById("layoutSelect").addEventListener("change", e => {
            setLayout(e.target.value);
            localStorage.setItem("layoutType", e.target.value);
        });

        // ---------------- STREAM ----------------
        async function loadStream(container, cam) {

            const { path } = cam;
            let { webrtcUrl } = cam;

            if (!webrtcUrl) {
                console.error("webrtcUrl no definido:", cam);
                return;
            }

            // 🔥 asegurar /whep
            if (!webrtcUrl.endsWith("/whep")) {
                webrtcUrl += "/whep";
            }

            // Si ya existe conexión, reutilizar
            if (connections[path]) {
                container.innerHTML = "";
                container.appendChild(connections[path].video);
                connections[path].container = container;
                saveLayout();
                return;
            }

            container.innerHTML = "";

            const video = document.createElement("video");
            video.autoplay = true;
            video.playsInline = true;
            video.muted = true;

            const status = document.createElement("div");
            status.className = "status offline";
            status.textContent = "Connecting";

            container.appendChild(video);
            container.appendChild(status);

            try {
                const pc = new RTCPeerConnection();

                // 🔥 MUY IMPORTANTE
                pc.addTransceiver("video", { direction: "recvonly" });
                //pc.addTransceiver("audio", { direction: "recvonly" });

                connections[path] = {
                    pc,
                    video,
                    container,
                    cam
                };

                pc.ontrack = e => {
                    video.srcObject = e.streams[0];
                    status.className = "status online";
                    status.textContent = "Online";
                };

                pc.onconnectionstatechange = () => {
                    if (pc.connectionState === "disconnected" ||
                        pc.connectionState === "failed") {
                        status.className = "status offline";
                        status.textContent = "Offline";
                    }
                };

                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                const res = await fetch(webrtcUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/sdp" },
                    body: offer.sdp
                });

                if (!res.ok) {
                    throw new Error("HTTP error " + res.status);
                }

                const answer = await res.text();

                if (!answer.startsWith("v=")) {
                    throw new Error("Respuesta SDP inválida");
                }

                await pc.setRemoteDescription({
                    type: "answer",
                    sdp: answer
                });

                saveLayout();

            } catch (err) {
                console.error("Error cargando stream:", err);
                status.className = "status offline";
                status.textContent = "Offline";
            }
        }

        // ---------------- CONTROLS ----------------
        function closeStream(path) {
            if (!connections[path]) return;

            connections[path].pc.close();
            connections[path].container.innerHTML = "";
            delete connections[path];

            saveLayout();
        }

        function reconnect(path) {
            const conn = connections[path];
            if (!conn) return;

            const { container, cam } = conn;
            closeStream(path);
            loadStream(container, cam);
        }

        function toggleAudio(path) {
            Object.values(connections).forEach(c => c.video.muted = true);

            if (connections[path]) {
                connections[path].video.muted = false;
                activeAudio = path;
            }
        }

        function snapshot(path) {
            const video = connections[path]?.video;
            if (!video) return;

            const canvas = document.createElement("canvas");
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext("2d").drawImage(video, 0, 0);

            const link = document.createElement("a");
            link.download = `snapshot_${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        // ---------------- SAVE / LOAD LAYOUT ----------------
        function saveLayout() {
            const layout = {};

            Object.entries(connections).forEach(([path, conn]) => {
                if (conn.container?.dataset.index !== undefined) {
                    layout[path] = conn.container.dataset.index;
                }
            });

            localStorage.setItem("videowallLayout", JSON.stringify(layout));
        }

        function loadLayout() {
            const layout = JSON.parse(localStorage.getItem("videowallLayout") || "{}");

            Object.entries(layout).forEach(([path, index]) => {
                const slot = document.querySelector(`.slot[data-index="${index}"]`);
                const cam = cameras.find(c => c.path === path);

                if (slot && cam) {
                    loadStream(slot, cam);
                }
            });
        }

        // ---------------- INIT ----------------
        window.onload = async () => {
            await loadCameras();

            const savedLayout = localStorage.getItem("layoutType") || "3x2";
            document.getElementById("layoutSelect").value = savedLayout;

            setLayout(savedLayout);
        };
    </script>

</body>

</html>

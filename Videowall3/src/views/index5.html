<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>NVR Videowall</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: #e5e7eb;
            overflow: hidden;
            font-family: system-ui;
        }

        /* SIDEBAR */

        #sidebar {
            width: 300px;
            min-width: 300px;
            max-width: 300px;
            background: #111827;
            height: 100vh;
            border-right: 1px solid #1f2937;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 15px;
            font-weight: 600;
            border-bottom: 1px solid #1f2937;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform .2s;
        }

        .cam-warning {
            color: #facc15;
            margin-left: 5px;
            font-size: 14px;
        }

        .camera-card {
            background: #1f2937;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            cursor: grab;
            display: flex;
            justify-content: space-between;
            transition: .2s;
        }

        .camera-card:hover {
            background: #374151;
            transform: translateY(-2px);
        }

        /* TOPBAR */

        .topbar {
            height: 60px;
            background: #111827;
            border-bottom: 1px solid #1f2937;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }

        /* VIDEOWALL */

        #videowall {
            display: grid;
            gap: 10px;
            padding: 10px;
            height: calc(100vh - 60px);
            background: #020617;
        }

        .slot {
            background: black;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            border: 1px solid #1f2937;
        }

        

        /* OVERLAY */

        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, .7), transparent);
            padding: 6px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        .overlay-controls button {
            background: rgba(255, 255, 255, .1);
            border: none;
            color: white;
            border-radius: 6px;
            padding: 4px 6px;
            margin-left: 4px;
        }

        .overlay-controls button:hover {
            background: rgba(255, 255, 255, .25);
        }

        /* STATUS */

        .status {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 11px;
            padding: 3px 6px;
            border-radius: 4px;
        }

        .online {
            background: #16a34a;
        }

        .offline {
            background: #dc2626;
        }

        .fullscreen {
            position: fixed !important;
            top: 0;
            left: 0;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 9999;
        }
    </style>

</head>

<body>

    <div class="d-flex">

        <div id="sidebar">

            <div class="sidebar-header">

                <i class="bi bi-camera-video"></i> Cámaras

                <div class="mt-2">
                    <input id="searchCam" class="form-control form-control-sm" placeholder="Buscar cámara">
                </div>

                <div class="mt-2 small">
                    Online: <span id="camOnline">0</span> |
                    Offline: <span id="camOffline">0</span>
                </div>

            </div>

            <div class="p-3 flex-grow-1 overflow-auto" id="cameraList"></div>

        </div>

        <div class="flex-grow-1 d-flex flex-column">

            <div class="topbar">

                <div class="fw-semibold me-auto">
                    Videowall NVR
                </div>

                <select id="layoutSelect" class="form-select form-select-sm w-auto">

                    <option value="1">1x1</option>
                    <option value="4">2x2</option>
                    <option value="6" selected>3x2</option>
                    <option value="9">3x3</option>
                    <option value="16">4x4</option>
                    <option value="25">5x5</option>

                </select>

            </div>

            <div id="videowall"></div>

        </div>

    </div>

    <script>

        let cameras = []
        let streams = {}
        let layoutMemory = {}
        let zoomLevels = {}
        let onlineCount = 0
        let offlineCount = 0

        // LOAD CAMERAS

        async function loadCameras() {

            const res = await fetch("http://localhost:3000/api/cameras/webrtc")

            cameras = await res.json()

            renderCameraList()

        }

        // SIDEBAR

        function renderCameraList() {

            const list = document.getElementById("cameraList")

            list.innerHTML = ""

            cameras.forEach(cam => {

                const div = document.createElement("div")

                div.className = "camera-card"

                div.draggable = true

                div.innerHTML = `
<span>${cam.name}</span>
<i class="bi bi-camera-video"></i>
`

                div.addEventListener("dragstart", e => {
                    e.dataTransfer.setData("camera", JSON.stringify(cam))
                })

                list.appendChild(div)

            })

        }

        // GRID

        function setLayout(count) {

            const wall = document.getElementById("videowall")

            wall.innerHTML = ""

            const cols = Math.ceil(Math.sqrt(count))

            wall.style.gridTemplateColumns = `repeat(${cols},1fr)`

            for (let i = 0; i < count; i++) {

                const slot = document.createElement("div")

                slot.className = "slot"
                slot.dataset.index = i

                slot.addEventListener("dragover", e => e.preventDefault())

                slot.addEventListener("drop", e => {
                    e.preventDefault()
                    const cam = JSON.parse(e.dataTransfer.getData("camera"))
                    attachCamera(slot, cam)
                })

                wall.appendChild(slot)

            }

            restoreLayout()

        }

        // ATTACH CAMERA

        async function attachCamera(slot, cam) {
            if (cameraUsageCount(cam.path) > 0) {

                console.warn("Cámara ya usada en el videowall");
                /*setTimeout(() => {
                    alert("⚠ Esta cámara ya está en el videowall")
                }, 200)*/

            }

            slot.innerHTML = ""

            const video = document.createElement("video")

            video.autoplay = true
            video.playsInline = true
            video.muted = true

            slot.appendChild(video)

            const status = document.createElement("div")

            status.className = "status offline"
            status.innerText = "Connecting"

            slot.appendChild(status)

            video.addEventListener("wheel", e => zoomVideo(e, video))

            if (!streams[cam.path]) {
                await createStream(cam)
            }

            video.srcObject = streams[cam.path].media

            status.className = "status online"
            status.innerText = "Online"
            onlineCount++

            updateCounters()

            createOverlay(slot, cam)

            layoutMemory[slot.dataset.index] = cam.path

            saveLayout()

        }

        function cameraUsageCount(path) {

            return Object.values(layoutMemory).filter(p => p === path).length

        }

        function updateCounters() {

            document.getElementById("camOnline").innerText = onlineCount
            document.getElementById("camOffline").innerText = offlineCount

        }

        //CONTROL REPETICIÓN CÁMARA
        function cameraAlreadyUsed(path) {

            return Object.values(layoutMemory).includes(path)

        }

        // STREAM

        async function createStream(cam) {

            const pc = new RTCPeerConnection()

            pc.addTransceiver("video", { direction: "recvonly" })

            const media = new MediaStream()

            pc.ontrack = e => media.addTrack(e.track)

            const offer = await pc.createOffer()

            await pc.setLocalDescription(offer)

            await waitIce(pc)

            let url = cam.webrtcUrl

            if (!url.endsWith("/whep")) url += "/whep"

            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/sdp" },
                body: pc.localDescription.sdp
            })

            const answer = await res.text()

            await pc.setRemoteDescription({ type: "answer", sdp: answer })

            streams[cam.path] = { pc, media, cam }

        }

        // ICE

        function waitIce(pc) {

            return new Promise(resolve => {

                if (pc.iceGatheringState === "complete") return resolve()

                pc.onicegatheringstatechange = () => {
                    if (pc.iceGatheringState === "complete") resolve()
                }

            })

        }

        // OVERLAY



        function createOverlay(slot, cam) {

            const usage = cameraUsageCount(cam.path)

            const warning = usage > 1 ? '<span style="color:#facc15">⚠</span>' : ''

            const overlay = document.createElement("div")

            overlay.className = "overlay"

            overlay.innerHTML = `

<span>${cam.name} ${warning}</span>

<div class="overlay-controls">

<button onclick="toggleAudio('${cam.path}')">
<i class="bi bi-volume-up"></i>
</button>

<button onclick="snapshot(this.closest('.slot').querySelector('video'))">
<i class="bi bi-camera"></i>
</button>

<button onclick="zoomIn(this.closest('.slot').querySelector('video'))">
<i class="bi bi-zoom-in"></i>
</button>

<button onclick="zoomOut(this.closest('.slot').querySelector('video'))">
<i class="bi bi-zoom-out"></i>
</button>

<button onclick="toggleFullscreen(this.closest('.slot'))">
<i class="bi bi-arrows-fullscreen"></i>
</button>

</div>

`

            slot.appendChild(overlay)

        }

        function zoomIn(video) {

            let zoom = zoomLevels[video] || 1

            zoom += 0.2

            zoom = Math.min(zoom, 5)

            video.style.transform = `scale(${zoom})`

            zoomLevels[video] = zoom

        }

        function zoomOut(video) {

            let zoom = zoomLevels[video] || 1

            zoom -= 0.2

            zoom = Math.max(zoom, 1)

            video.style.transform = `scale(${zoom})`

            zoomLevels[video] = zoom

        }

        // FULLSCREEN

        function toggleFullscreen(slot) {
            slot.classList.toggle("fullscreen")
        }

        // SNAPSHOT

        function snapshot(video) {

            const canvas = document.createElement("canvas")

            canvas.width = video.videoWidth
            canvas.height = video.videoHeight

            canvas.getContext("2d").drawImage(video, 0, 0)

            const link = document.createElement("a")

            link.href = canvas.toDataURL()
            link.download = "snapshot.png"
            link.click()

        }

        // AUDIO

        function toggleAudio(path) {

            Object.values(streams).forEach(s => {
                s.media.getAudioTracks().forEach(t => t.enabled = false)
            })

            const s = streams[path]

            if (!s) return

            s.media.getAudioTracks().forEach(t => t.enabled = true)

        }

        // ZOOM

        function zoomVideo(e, video) {

            e.preventDefault()

            let zoom = zoomLevels[video] || 1

            zoom += e.deltaY < 0 ? 0.1 : -0.1

            zoom = Math.min(Math.max(1, zoom), 5)

            video.style.transform = `scale(${zoom})`

            zoomLevels[video] = zoom

        }

        function resetZoom(video) {

            video.style.transform = "scale(1)"

            zoomLevels[video] = 1

        }

        // LAYOUT SAVE

        function saveLayout() {

            localStorage.setItem("videowallLayout", JSON.stringify(layoutMemory))

        }

        // RESTORE

        function restoreLayout() {

            const saved = localStorage.getItem("videowallLayout")

            if (!saved) return

            layoutMemory = JSON.parse(saved)

            Object.entries(layoutMemory).forEach(([slotIndex, path]) => {

                const slot = document.querySelector(`[data-index='${slotIndex}']`)

                const cam = cameras.find(c => c.path === path)

                if (slot && cam) {
                    attachCamera(slot, cam)
                }

            })

        }

        // SEARCH

        document.getElementById("searchCam").addEventListener("input", e => {

            const value = e.target.value.toLowerCase()

            document.querySelectorAll(".camera-card").forEach(c => {

                c.style.display = c.textContent.toLowerCase().includes(value) ? "flex" : "none"

            })

        })

        // LAYOUT CHANGE

        document.getElementById("layoutSelect").addEventListener("change", e => {

            const value = parseInt(e.target.value)

            setLayout(value)

            localStorage.setItem("layoutType", value)

        })

        // INIT

        window.onload = async () => {

            await loadCameras()

            const savedLayout = localStorage.getItem("layoutType") || 6

            document.getElementById("layoutSelect").value = savedLayout

            setLayout(savedLayout)

        }

    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>NVR Videowall 8</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: #e5e7eb;
            overflow: hidden;
            font-family: system-ui;
        }

        /* SIDEBAR */
        #sidebar {
            width: 300px;
            min-width: 300px;
            max-width: 300px;
            background: #111827;
            height: 100vh;
            border-right: 1px solid #1f2937;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 15px;
            font-weight: 600;
            border-bottom: 1px solid #1f2937;
        }

        .camera-card {
            background: #1f2937;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            cursor: grab;
            display: flex;
            justify-content: space-between;
            transition: .2s;
        }

        .camera-card:hover {
            background: #374151;
            transform: translateY(-2px);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform .2s ease;
            cursor: grab;
        }

        .cam-warning {
            color: #facc15;
            margin-left: 5px;
            font-size: 14px;
        }

        /* TOPBAR */
        .topbar {
            height: 60px;
            background: #111827;
            border-bottom: 1px solid #1f2937;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 10px;
        }

        /* VIDEOWALL */
        #videowall {
            display: grid;
            gap: 10px;
            padding: 10px;
            height: calc(100vh - 60px);
            background: #020617;
        }

        .slot {
            background: black;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            border: 1px solid #1f2937;
        }

        .slot video {
            transition: transform .25s ease, opacity .25s ease;
        }

        /* OVERLAY */
        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, .7), transparent);
            padding: 6px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        .overlay-controls button {
            background: rgba(255, 255, 255, .1);
            border: none;
            color: white;
            border-radius: 6px;
            padding: 4px 6px;
            margin-left: 4px;
        }

        .overlay-controls button:hover {
            background: rgba(255, 255, 255, .25);
        }

        /* STATUS */
        .status {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 11px;
            padding: 3px 6px;
            border-radius: 4px;
        }

        .online {
            background: #16a34a;
        }

        .offline {
            background: #dc2626;
        }

        .fullscreen {
            position: fixed !important;
            top: 0;
            left: 0;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 9999;
        }

        .slot.drag-over {
            outline: 2px solid #3b82f6;
        }
    </style>

</head>

<body>

    <div class="d-flex">

        <div id="sidebar">

            <div class="sidebar-header">

                <i class="bi bi-camera-video"></i> Cámaras

                <div class="mt-2">
                    <input id="searchCam" class="form-control form-control-sm" placeholder="Buscar cámara">
                </div>

                <div class="mt-2 small">
                    Online: <span id="camOnline">0</span> |
                    Offline: <span id="camOffline">0</span>
                </div>

                <div class="d-flex gap-2 mt-2">

                    <select id="layoutSelect" class="form-select form-select-sm">

                        <option value="1">1x1</option>
                        <option value="4">2x2</option>
                        <option value="6" selected>3x2</option>
                        <option value="9">3x3</option>
                        <option value="16">4x4</option>
                        <option value="25">5x5</option>

                    </select>
                    <button id="tourBtn" class="btn btn-sm btn-success">
                        <i class="bi bi-arrow-repeat"></i>
                    </button>

                    <button class="btn btn-sm btn-danger" id="clearLayout">
                        <i class="bi bi-trash"></i>
                    </button>

                </div>

            </div>

            <div class="p-3 flex-grow-1 overflow-auto" id="cameraList"></div>

        </div>

        <div class="flex-grow-1 d-flex flex-column">

            <div class="topbar">

                <div class="fw-semibold me-auto">
                    Videowall NVR
                </div>



            </div>

            <div id="videowall"></div>

        </div>

    </div>

    <script>
        let cameras = []
        let streams = {}
        let layoutMemory = {}
        let zoomLevels = new Map();       // nivel de zoom por video
        let panOffsets = new Map();       // desplazamiento {x, y} por video
        let draggingVideo = null;
        let dragStart = { x: 0, y: 0 };
        let panStart = { x: 0, y: 0 };
        let onlineCount = 0;
        let offlineCount = 0;
        let draggingSlotIndex = null;
        let reconnectTimers = {};
        let reconnectAttempts = {};
        let tourActive = false;
        let tourTimer = null;
        let tourIndex = 0;

        // ---------------- LOAD CAMERAS ----------------
        async function loadCameras() {
            const res = await fetch("http://localhost:3000/api/cameras/webrtc")
            cameras = await res.json()
            renderCameraList()
        }

        function renderCameraList() {
            const list = document.getElementById("cameraList")
            list.innerHTML = ""
            cameras.forEach(cam => {
                const div = document.createElement("div")
                div.className = "camera-card"
                div.draggable = true
                div.innerHTML = `<span>${cam.name}</span><i class="bi bi-camera-video"></i>`
                div.addEventListener("dragstart", e => e.dataTransfer.setData("camera", JSON.stringify(cam)))
                list.appendChild(div)
            })
        }

        // ---------------- LAYOUT ----------------
        function setLayout(count) {

            const wall = document.getElementById("videowall")
            wall.innerHTML = ""

            const cols = Math.ceil(Math.sqrt(count))
            wall.style.gridTemplateColumns = `repeat(${cols},1fr)`

            for (let i = 0; i < count; i++) {

                const slot = document.createElement("div")
                slot.className = "slot"
                slot.dataset.index = i

                // permitir drop
                slot.addEventListener("dragover", e => e.preventDefault())

                // highlight PRO
                slot.addEventListener("dragenter", () => slot.classList.add("drag-over"))
                slot.addEventListener("dragleave", () => slot.classList.remove("drag-over"))

                // DROP
                slot.addEventListener("drop", e => {

                    e.preventDefault()
                    slot.classList.remove("drag-over")

                    const slotFrom = e.dataTransfer.getData("slotIndex")

                    // ===== SWAP / MOVE =====
                    if (slotFrom !== "") {
                        moveOrSwap(slotFrom, slot.dataset.index)
                        draggingSlotIndex = null
                        return
                    }

                    // ===== DRAG DESDE SIDEBAR =====
                    const cam = JSON.parse(e.dataTransfer.getData("camera"))
                    attachCamera(slot, cam, true)
                })

                wall.appendChild(slot)
            }

            restoreLayout()
        }

        function moveOrSwap(i1, i2) {


            if (i1 === i2) return

            const slot1 = document.querySelector(`[data-index='${i1}']`)
            const slot2 = document.querySelector(`[data-index='${i2}']`)

            const video1 = slot1.querySelector("video")
            const video2 = slot2.querySelector("video")

            const overlay1 = slot1.querySelector(".overlay")
            const overlay2 = slot2.querySelector(".overlay")

            const status1 = slot1.querySelector(".status")
            const status2 = slot2.querySelector(".status")

            const path1 = layoutMemory[i1]
            const path2 = layoutMemory[i2]

            // limpiar slots
            slot1.innerHTML = ""
            slot2.innerHTML = ""

            // mover video1 → slot2
            if (video1) {
                slot2.appendChild(video1)
                if (status1) slot2.appendChild(status1)
                if (overlay1) slot2.appendChild(overlay1)

                layoutMemory[i2] = path1
            } else {
                delete layoutMemory[i2]
            }

            // mover video2 → slot1
            if (video2) {
                slot1.appendChild(video2)
                if (status2) slot1.appendChild(status2)
                if (overlay2) slot1.appendChild(overlay2)

                layoutMemory[i1] = path2
            } else {
                delete layoutMemory[i1]
            }

            updateCounters()
            saveLayout()
        }

        function swapSlots(i1, i2) {

            if (i1 === i2) return

            const path1 = layoutMemory[i1]
            const path2 = layoutMemory[i2]

            const slot1 = document.querySelector(`[data-index='${i1}']`)
            const slot2 = document.querySelector(`[data-index='${i2}']`)

            slot1.innerHTML = ""
            slot2.innerHTML = ""

            if (path2) {
                const cam2 = cameras.find(c => c.path === path2)
                attachCamera(slot1, cam2)
            }

            if (path1) {
                const cam1 = cameras.find(c => c.path === path1)
                attachCamera(slot2, cam1)
            }

            saveLayout()
        }

        // ---------------- ATTACH CAMERA ----------------
        async function attachCamera(slot, cam, manual = false) {
            const usageCount = cameraUsageCount(cam.path)
            // Solo mostrar mensaje si es un drag manual
            if (manual && usageCount > 0) {
                setTimeout(() => alert("⚠ Esta cámara ya está en el videowall"), 200)
            }

            slot.innerHTML = ""
            const video = document.createElement("video")
            video.autoplay = true
            video.playsInline = true
            video.muted = true
            slot.appendChild(video)

            const status = document.createElement("div")
            status.className = "status offline"
            status.innerText = "Connecting"
            slot.appendChild(status)

            video.addEventListener("wheel", e => zoomVideo(e, video))

            if (!streams[cam.path]) await createStream(cam)

            video.srcObject = streams[cam.path].media

            status.className = "status online"
            status.innerText = "Online"

            layoutMemory[slot.dataset.index] = cam.path
            updateCounters()
            createOverlay(slot, cam)
            saveLayout()

            slot.draggable = true

            slot.addEventListener("dragstart", e => {
                draggingSlotIndex = slot.dataset.index
                e.dataTransfer.setData("slotIndex", slot.dataset.index)
            })
        }

        // ---------------- CAMERA UTILS ----------------
        function cameraUsageCount(path) {
            return Object.values(layoutMemory).filter(p => p === path).length
        }

        function updateCounters() {
            let online = 0
            let offline = 0
            Object.values(layoutMemory).forEach(path => {
                if (streams[path]) online++
                else offline++
            })
            document.getElementById("camOnline").innerText = online
            document.getElementById("camOffline").innerText = offline
        }

        // ---------------- STREAM ----------------
        async function createStream(cam) {

            if (streams[cam.path]?.pc) {
                try { streams[cam.path].pc.close() } catch { }
            }

            const pc = new RTCPeerConnection()
            pc.addTransceiver("video", { direction: "recvonly" })

            const media = new MediaStream()
            pc.ontrack = e => media.addTrack(e.track)

            pc.onconnectionstatechange = () => {

                const state = pc.connectionState

                if (state === "failed" || state === "disconnected") {

                    console.log("RECONNECT", cam.name)
                    smartReconnect(cam)
                }
            }

            const offer = await pc.createOffer()
            await pc.setLocalDescription(offer)
            await waitIce(pc)

            let url = cam.webrtcUrl
            if (!url.endsWith("/whep")) url += "/whep"

            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/sdp" },
                body: pc.localDescription.sdp
            })

            const answer = await res.text()
            await pc.setRemoteDescription({ type: "answer", sdp: answer })

            streams[cam.path] = { pc, media, cam }
        }

        function smartReconnect(cam) {

            const path = cam.path

            reconnectAttempts[path] = (reconnectAttempts[path] || 0) + 1

            const delay = Math.min(10000, reconnectAttempts[path] * 1500)

            clearTimeout(reconnectTimers[path])

            reconnectTimers[path] = setTimeout(async () => {

                console.log("Trying reconnect", cam.name)

                await createStream(cam)

                // reasignar stream a todos los videos que usan esa cam
                document.querySelectorAll(".slot").forEach(slot => {

                    const index = slot.dataset.index
                    if (layoutMemory[index] === path) {

                        const video = slot.querySelector("video")
                        if (video) {
                            video.srcObject = streams[path].media
                        }
                    }
                })

            }, delay)
        }

        function waitIce(pc) {
            return new Promise(resolve => {
                if (pc.iceGatheringState === "complete") resolve()
                pc.onicegatheringstatechange = () => { if (pc.iceGatheringState === "complete") resolve() }
            })
        }

        // ---------------- OVERLAY ----------------
        function createOverlay(slot, cam) {
            const overlay = document.createElement("div")
            overlay.className = "overlay"

            overlay.innerHTML = `
    <span>${cam.name}</span>

    <div class="overlay-controls">

    <button onclick="snapshot(this.closest('.slot').querySelector('video'))">
    <i class="bi bi-camera"></i>
    </button>

    <button onclick="zoomIn(this.closest('.slot').querySelector('video'))">
    <i class="bi bi-zoom-in"></i>
    </button>

    <button onclick="zoomOut(this.closest('.slot').querySelector('video'))">
    <i class="bi bi-zoom-out"></i>
    </button>

    <button onclick="resetView(this.closest('.slot').querySelector('video'))">
    <i class="bi bi-crosshair"></i>
    </button>

    <button onclick="toggleFullscreen(this.closest('.slot'))">
    <i class="bi bi-arrows-fullscreen"></i>
    </button>

    <button onclick="removeCamera(this.closest('.slot'))">
    <i class="bi bi-x-lg"></i>
    </button>

    </div>
    `

            slot.appendChild(overlay)

            const video = slot.querySelector("video")
            enablePan(video)
        }

        // ---------------- CONTROL ----------------
        function zoomIn(video) { applyZoom(video, 0.2) }

        function zoomOut(video) {
            let zoom = zoomLevels.get(video) || 1
            let pan = panOffsets.get(video) || { x: 0, y: 0 }

            zoom -= 0.2
            zoom = Math.max(1, zoom)

            // acercar imagen suavemente a posición inicial
            pan.x *= zoom / (zoom + 0.2)
            pan.y *= zoom / (zoom + 0.2)

            video.style.transformOrigin = "50% 50%"
            video.style.transform = `scale(${zoom}) translate(${pan.x}px, ${pan.y}px)`

            zoomLevels.set(video, zoom)
            panOffsets.set(video, pan)
        }

        function applyZoom(video, delta) {
            let zoom = zoomLevels.get(video) || 1
            let pan = panOffsets.get(video) || { x: 0, y: 0 }

            zoom += delta
            zoom = Math.min(Math.max(1, zoom), 5)

            video.style.transformOrigin = "50% 50%"
            video.style.transform = `scale(${zoom}) translate(${pan.x}px, ${pan.y}px)`

            zoomLevels.set(video, zoom)
            panOffsets.set(video, pan)
        }

        function resetView(video) {

            zoomLevels.set(video, 1)

            panOffsets.set(video, { x: 0, y: 0 })

            video.style.transformOrigin = "50% 50%"
            video.style.transform = "scale(1) translate(0px,0px)"

        }

        // ---------------- PAN ----------------
        function enablePan(video) {
            video.addEventListener("mousedown", e => {
                if ((zoomLevels.get(video) || 1) <= 1) return
                draggingVideo = video
                dragStart = { x: e.clientX, y: e.clientY }
                panStart = panOffsets.get(video) || { x: 0, y: 0 }
                video.style.cursor = "grabbing"
                e.preventDefault()
            })
        }

        window.addEventListener("mousemove", e => {
            if (!draggingVideo) return

            let pan = panOffsets.get(draggingVideo) || { x: 0, y: 0 }
            let zoom = zoomLevels.get(draggingVideo) || 1

            let dx = (e.clientX - dragStart.x) / zoom
            let dy = (e.clientY - dragStart.y) / zoom

            panOffsets.set(draggingVideo, { x: panStart.x + dx, y: panStart.y + dy })
            draggingVideo.style.transform = `scale(${zoom}) translate(${panStart.x + dx}px, ${panStart.y + dy}px)`
        })

        window.addEventListener("mouseup", e => {
            if (draggingVideo) {
                draggingVideo.style.cursor = "grab"
                draggingVideo = null
            }
        })

        // ---------------- ZOOM WHEEL ----------------
        function zoomVideo(e, video) {
            e.preventDefault()

            let rect = video.getBoundingClientRect()
            let offsetX = e.clientX - rect.left
            let offsetY = e.clientY - rect.top

            let zoom = zoomLevels.get(video) || 1
            let pan = panOffsets.get(video) || { x: 0, y: 0 }

            zoom += e.deltaY < 0 ? 0.1 : -0.1
            zoom = Math.min(Math.max(1, zoom), 5)

            let originX = (offsetX / rect.width) * 100
            let originY = (offsetY / rect.height) * 100
            video.style.transformOrigin = `${originX}% ${originY}%`

            video.style.transform = `scale(${zoom}) translate(${pan.x}px, ${pan.y}px)`

            zoomLevels.set(video, zoom)
            panOffsets.set(video, pan)
        }

        // ---------------- FULLSCREEN / SNAPSHOT / AUDIO ----------------
        function toggleFullscreen(slot) { slot.classList.toggle("fullscreen") }

        function snapshot(video) {
            const canvas = document.createElement("canvas")
            canvas.width = video.videoWidth
            canvas.height = video.videoHeight
            canvas.getContext("2d").drawImage(video, 0, 0)
            const link = document.createElement("a")
            link.href = canvas.toDataURL()
            link.download = "snapshot.png"
            link.click()
        }

        function removeCamera(slot) {

            const index = slot.dataset.index
            slot.innerHTML = ""
            delete layoutMemory[index]
            updateCounters()
            saveLayout()

        }


        // ---------------- SAVE / RESTORE ----------------
        function saveLayout() { localStorage.setItem("videowallLayout", JSON.stringify(layoutMemory)) }

        function restoreLayout() {
            const saved = localStorage.getItem("videowallLayout")
            if (!saved) return
            layoutMemory = JSON.parse(saved)
            Object.entries(layoutMemory).forEach(([slotIndex, path]) => {
                const slot = document.querySelector(`[data-index='${slotIndex}']`)
                const cam = cameras.find(c => c.path === path)
                if (slot && cam) attachCamera(slot, cam)
            })
        }

        // ---------------- CLEAR ----------------
        function clearLayout() {
            document.querySelectorAll(".slot").forEach(s => s.innerHTML = "")
            layoutMemory = {}
            zoomLevels.clear()
            panOffsets.clear()
            updateCounters()
        }

        // ---------------- SEARCH ----------------
        document.getElementById("searchCam").addEventListener("input", e => {
            const value = e.target.value.toLowerCase()
            document.querySelectorAll(".camera-card").forEach(c => {
                c.style.display = c.textContent.toLowerCase().includes(value) ? "flex" : "none"
            })
        })

        // ---------------- EVENTS ----------------
        document.getElementById("layoutSelect").addEventListener("change", e => setLayout(parseInt(e.target.value)))
        document.getElementById("clearLayout").addEventListener("click", clearLayout)

        // ---------------- INIT ----------------
        window.onload = async () => {
            await loadCameras()
            const savedLayout = localStorage.getItem("layoutType") || 6
            document.getElementById("layoutSelect").value = savedLayout
            setLayout(savedLayout)
        }

        // ---------------  VIDEO RONDA -----------------
        document.getElementById("tourBtn").addEventListener("click", toggleTour);
        function toggleTour() {

            tourActive = !tourActive

            const btn = document.getElementById("tourBtn")

            if (tourActive) {
                btn.classList.remove("btn-success")
                btn.classList.add("btn-warning")
                startTour()
            } else {
                btn.classList.add("btn-success")
                btn.classList.remove("btn-warning")
                stopTour()
            }
        }

        function startTour() {

            tourTimer = setInterval(() => {

                rotateLayout()

            }, 10000)
        }

        function stopTour() {
            clearInterval(tourTimer)
        }

        function rotateLayout() {

            const slots = [...document.querySelectorAll(".slot")]

            if (slots.length <= 1) return

            const last = slots[slots.length - 1]

            const videoLast = last.querySelector("video")
            const overlayLast = last.querySelector(".overlay")
            const statusLast = last.querySelector(".status")
            const pathLast = layoutMemory[last.dataset.index]

            for (let i = slots.length - 1; i > 0; i--) {

                const current = slots[i]
                const prev = slots[i - 1]

                const v = prev.querySelector("video")
                const o = prev.querySelector(".overlay")
                const s = prev.querySelector(".status")
                const path = layoutMemory[prev.dataset.index]

                current.innerHTML = ""

                if (v) current.appendChild(v)
                if (s) current.appendChild(s)
                if (o) current.appendChild(o)

                layoutMemory[current.dataset.index] = path
            }

            // slot1 recibe última
            const first = slots[0]
            first.innerHTML = ""

            if (videoLast) first.appendChild(videoLast)
            if (statusLast) first.appendChild(statusLast)
            if (overlayLast) first.appendChild(overlayLast)

            layoutMemory[first.dataset.index] = pathLast

            saveLayout()
        }

    </script>

</body>

</html>
